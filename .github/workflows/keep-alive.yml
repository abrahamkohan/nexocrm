name: Supabase Keep Alive + Daily Digest

on:
  schedule:
    # Digest diario: 7am Paraguay (UTC-4) = 11am UTC
    - cron: '0 11 * * *'
    # Keep-alive extra los días que no corre el digest (nunca pausa)
    # el digest ya hace ping implícito, así que solo necesitamos el diario
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (keep-alive)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://vencfssognoggperdxua.supabase.co/rest/v1/consultora_config?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Ping status: $STATUS"

  daily-digest:
    runs-on: ubuntu-latest
    needs: ping
    steps:
      - name: Send daily digest
        run: |
          STATUS=$(curl -s -o /tmp/digest_response.json -w "%{http_code}" \
            -X POST \
            "https://vencfssognoggperdxua.supabase.co/functions/v1/daily-digest" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "x-digest-token: ${{ secrets.DIGEST_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Digest status: $STATUS"
          cat /tmp/digest_response.json
